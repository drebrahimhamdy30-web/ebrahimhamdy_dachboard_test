<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة التحويلات - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* تنسيق كروت التحويلات المحسن */
        .transfer-card {
            background: white;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-right: 5px solid #3498db;
            position: relative;
            transition: transform 0.2s;
        }
        
        .transfer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        .direction-badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .inbound { background: #e3f2fd; color: #1976d2; }
        .outbound { background: #fff3e0; color: #f57c00; }

        .item-info { margin-bottom: 12px; }
        .item-name { font-weight: bold; color: #2c3e50; font-size: 1.1rem; display: block; }
        .item-code { font-size: 0.85rem; color: #64748b; font-family: monospace; }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            background: #f8fafc;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 0.85rem;
        }

        .action-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .note-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        .controls-row {
            display: flex;
            gap: 8px;
        }

        .status-select {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: white;
            font-weight: bold;
        }

        .btn-save-mobile {
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .filter-container {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .filter-row {
            display: flex;
            gap: 8px;
        }

        .filter-control {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #cbd5e0;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <!-- تم تعديل هذا السطر ليتوافق مع nav.js -->
    <div class="nav-bar"></div>

    <main class="content">
        <header style="margin-bottom: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1>إدارة التحويلات</h1>
                    <p id="branch-display" style="color: #3498db; font-weight: bold;">جاري التحميل...</p>
                </div>
                <button onclick="loadTransfers()" class="stat-card" style="padding: 12px; border: none; cursor: pointer; background: white; border-radius: 10px;">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </header>

        <div class="filter-container">
            <div class="filter-row">
                <select id="direction-filter" class="filter-control" onchange="applyFilters()">
                    <option value="inbound" selected>وارد إلينا 📥</option>
                    <option value="outbound">مرسل منا 📤</option>
                    <option value="all">الكل</option>
                </select>
                <select id="status-filter" class="filter-control" onchange="applyFilters()">
                    <option value="pending" selected>قيد الانتظار ⏳</option>
                    <option value="transferred">تم التحويل ✅</option>
                    <option value="unavailable">نقص ❌</option>
                    <option value="all">الكل</option>
                </select>
            </div>
            <select id="branch-select-filter" class="filter-control" onchange="applyFilters()">
                <option value="all">كل الفروع المتعاونة</option>
            </select>
        </div>

        <div id="transfers-container">
            <p style="text-align: center; padding: 40px; color: #94a3b8;">جاري تحميل التحويلات...</p>
        </div>
    </main>

    <script src="api.js"></script>
    <script src="nav.js"></script>
    <script>
        let rawData = [];
        const activeUser = checkAuth();
        // جلب اسم الفرع من التخزين المحلي لضمان الفلترة الصحيحة
        const userBranchName = localStorage.getItem('userBranch') || "المعمورة";

        if (activeUser) {
            document.getElementById('branch-display').innerText = "📍 فرع " + userBranchName;
            window.onload = loadTransfers;
        }

        async function loadTransfers() {
            const container = document.getElementById('transfers-container');
            container.innerHTML = '<p style="text-align: center; padding: 40px;">⏳ جاري جلب البيانات...</p>';
            try {
                const items = await fetchOrders();
                
                if (Array.isArray(items)) {
                    // تصفية البيانات لتشمل التحويلات فقط
                    rawData = items.filter(item => item.type === "تحويل");
                    populateBranchFilter(rawData);
                    applyFilters(); 
                } else {
                    container.innerHTML = '<p style="text-align: center; padding: 40px;">لا توجد تحويلات حالياً</p>';
                }
            } catch (error) {
                container.innerHTML = '<p style="text-align: center; color:red; padding: 40px;">❌ خطأ في الاتصال</p>';
            }
        }

        function populateBranchFilter(data) {
            const branchSelect = document.getElementById('branch-select-filter');
            const branches = new Set();
            data.forEach(item => {
                if (item.user && item.user !== userBranchName) branches.add(item.user);
                if (item.branch && item.branch !== userBranchName) branches.add(item.branch);
            });
            branchSelect.innerHTML = '<option value="all">كل الفروع المتعاونة</option>';
            branches.forEach(br => {
                const opt = document.createElement('option');
                opt.value = br; opt.innerText = br;
                branchSelect.appendChild(opt);
            });
        }

        function applyFilters() {
            const directionVal = document.getElementById('direction-filter').value;
            const statusVal = document.getElementById('status-filter').value;
            const selectedBranch = document.getElementById('branch-select-filter').value;

            const filtered = rawData.filter(item => {
                const isTarget = (item.branch === userBranchName);
                const isSource = (item.user === userBranchName);
                let dirMatch = (directionVal === 'all') || (directionVal === 'inbound' && isTarget) || (directionVal === 'outbound' && isSource);
                let statMatch = (statusVal === 'all') || ((item.status || item.state || 'pending') === statusVal);
                let branchMatch = (selectedBranch === 'all') || (item.user === selectedBranch || item.branch === selectedBranch);
                return dirMatch && statMatch && branchMatch;
            });
            renderCards(filtered);
        }

        function renderCards(items) {
            const container = document.getElementById('transfers-container');
            container.innerHTML = '';

            if (items.length === 0) {
                container.innerHTML = '<p style="text-align: center; padding: 40px; color: #94a3b8;">لا توجد نتائج مطابقة</p>';
                return;
            }

            items.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0)).forEach((item) => {
                const isRequestForMe = (item.branch === userBranchName);
                const currentState = item.status || item.state || 'pending';
                const dateObj = item.createdAt ? new Date(item.createdAt) : null;
                const timeStr = dateObj ? dateObj.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }) : '--:--';

                const card = document.createElement('div');
                card.className = 'transfer-card';
                
                // تغيير لون الحافة بناءً على الحالة
                if (currentState === 'unavailable') card.style.borderRightColor = '#e74c3c';
                else if (currentState === 'transferred') card.style.borderRightColor = '#2ecc71';
                else card.style.borderRightColor = isRequestForMe ? '#3498db' : '#f39c12';

                card.innerHTML = `
                    <div class="transfer-header">
                        <span class="direction-badge ${isRequestForMe ? 'inbound' : 'outbound'}">
                            ${isRequestForMe ? '<i class="fas fa-arrow-down"></i> وارد من: ' + item.user : '<i class="fas fa-arrow-up"></i> صادر إلى: ' + item.branch}
                        </span>
                        <span style="font-size: 0.8rem; color: #94a3b8; font-weight: bold;">${timeStr}</span>
                    </div>
                    
                    <div class="item-info">
                        <span class="item-name">${item.item_name || item.item || '-'}</span>
                        <span class="item-code"><i class="fas fa-barcode"></i> ${item.item_code || '-'}</span>
                    </div>

                    <div class="details-grid">
                        <div><i class="fas fa-user"></i> ${item.cust_name || 'بدون اسم'}</div>
                        <div style="text-align: left;"><b>الكمية: ${item.qty || '1'}</b></div>
                    </div>

                    <div class="action-area">
                        <input type="text" id="note-${item.id}" class="note-input" placeholder="اكتب ملاحظة..." value="${item.company || ''}" ${!isRequestForMe ? 'disabled' : ''}>
                        <div class="controls-row">
                            <select id="stat-${item.id}" class="status-select" ${!isRequestForMe ? 'disabled' : ''}>
                                <option value="pending" ${currentState === 'pending'?'selected':''}>⏳ انتظار</option>
                                <option value="transferred" ${currentState === 'transferred'?'selected':''}>✅ تم التحويل</option>
                                <option value="unavailable" ${currentState === 'unavailable'?'selected':''}>❌ نقص</option>
                            </select>
                            ${isRequestForMe ? `<button class="btn-save-mobile" onclick="saveTransfer('${item.id}', this)">حفظ</button>` : `<div style="flex:1; text-align:center; padding:10px; color:#94a3b8; font-size:0.8rem; border:1px dashed #ddd; border-radius:10px;">بانتظار الرد</div>`}
                        </div>
                    </div>`;
                container.appendChild(card);
            });
        }

        async function saveTransfer(id, btn) {
            const statusValue = document.getElementById(`stat-${id}`).value;
            const notes = document.getElementById(`note-${id}`).value;

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            const success = await updateData({ 
                id: id, 
                status: statusValue, 
                company: notes, 
                type: "تحويل", 
                action: "update_status" 
            });

            if (success) {
                btn.style.background = "#2ecc71";
                btn.innerHTML = '<i class="fas fa-check"></i>';
                setTimeout(() => loadTransfers(), 800);
            } else {
                btn.disabled = false;
                btn.innerHTML = 'حفظ';
                alert("⚠️ فشل التحديث");
            }
        }
    </script>
</body>
</html>
