<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>الإشعارات - صيدليات د. إبراهيم</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="nav-bar"></div>
  <div class="container">
    <div class="card">
      <div class="page-header">
        <div class="page-title"><i class="fas fa-bell"></i> إشعارات وتنبيهات الفروع</div>
        <button class="btn btn-primary" onclick="loadNotifications()"><i class="fas fa-sync-alt"></i> تحديث</button>
      </div>

      <div class="filter-bar">
        <label class="check-label"><input type="checkbox" id="showReceived" checked onchange="applyFilter()"> واردة 📥</label>
        <label class="check-label"><input type="checkbox" id="showSent" onchange="applyFilter()"> مرسلة 📤</label>
        <label class="check-label" style="border-right:2px solid var(--border);padding-right:14px;margin-right:6px;">
          <input type="checkbox" id="hideDone" checked onchange="applyFilter()"> قيد الانتظار فقط
        </label>
      </div>

      <div id="notif-container">
        <p style="text-align:center;padding:30px;color:var(--text-muted);">جاري التحميل...</p>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="nav.js"></script>
  <script>
// بعد ✅
let activeUser = null;
let userBranch = '';
let allItems = [];

checkAuth().then(user => {
  activeUser = user;
  if (user) {
    userBranch = (localStorage.getItem('userBranch') || '').trim();
    window.onload = loadNotifications;
  }
});

    async function loadNotifications() {
      const container = document.getElementById('notif-container');
      container.innerHTML = '<p style="text-align:center;padding:20px;color:var(--text-muted);">⏳ جاري تحديث التنبيهات...</p>';
      try {
        const response = await fetchFromN8N('notifications');
        allItems = (response[0]?.data) ? response[0].data : (response.data || response);
        applyFilter();
      } catch(e) {
        container.innerHTML = '<p style="text-align:center;color:var(--danger);padding:20px;">❌ خطأ في الاتصال</p>';
      }
    }

    function applyFilter() {
      const container = document.getElementById('notif-container');
      const current = String(userBranch).trim();
      const filtered = allItems.filter(item => {
        const isDone = (item.done === "تم" || item.done === true || item.done === "true");
        if (document.getElementById('hideDone').checked && isDone) return false;
        const isSent = (String(item.branch).trim() === current);
        const isReceived = (String(item.target_branch).trim() === current);
        const showSent = document.getElementById('showSent').checked;
        const showReceived = document.getElementById('showReceived').checked;
        return (showSent && isSent) || (showReceived && isReceived);
      });
      renderNotifications(filtered);
    }

    function renderNotifications(items) {
      const container = document.getElementById('notif-container');
      if (items.length === 0) {
        container.innerHTML = '<div style="text-align:center;padding:50px;color:var(--text-muted);"><i class="fas fa-inbox" style="font-size:2rem;display:block;margin-bottom:10px;opacity:0.3;"></i>لا توجد تنبيهات تطابق الفلتر</div>';
        return;
      }
      container.innerHTML = '';
      items.sort((a, b) => new Date(a.createdAt || 0) - new Date(b.createdAt || 0));
      items.forEach(item => {
        const isDone = (item.done === "تم" || item.done === true || item.done === "true");
        const dateStr = item.createdAt ? new Date(item.createdAt).toLocaleString('ar-EG', {hour:'2-digit', minute:'2-digit', day:'numeric', month:'numeric'}) : '؟';
        const div = document.createElement('div');
        div.className = `notif-card ${isDone ? 'done' : ''}`;
        div.innerHTML = `
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
            <span style="font-weight:700;color:var(--text-primary);font-size:0.95rem;">📌 ${item.note || 'إشعار'}</span>
            <span style="color:var(--text-muted);font-size:0.72rem;white-space:nowrap;margin-right:10px;">${dateStr}</span>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
            <div style="font-size:0.82rem;display:flex;align-items:center;gap:6px;">
              <span class="branch-tag">${item.branch}</span>
              <i class="fas fa-arrow-left" style="color:var(--text-muted);font-size:0.75rem;"></i>
              <span class="branch-tag">${item.target_branch}</span>
            </div>
            <div style="display:flex;gap:8px;align-items:center;flex:1;justify-content:flex-end;">
              <input type="text" id="comm-${item.id}"
                style="padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:0.82rem;font-family:var(--font);flex:1;max-width:220px;outline:none;"
                placeholder="تعليق أو رد..."
                value="${item.comment !== 'null' ? (item.comment || '') : ''}">
              ${!isDone
                ? `<button onclick="handleDone(event, '${item.id}')" class="btn btn-success btn-sm">تم</button>`
                : `<span style="color:var(--success);font-weight:700;font-size:0.82rem;"><i class="fas fa-check-circle"></i> مكتمل</span>`}
            </div>
          </div>`;
        container.appendChild(div);
      });
    }

    async function handleDone(event, id) {
      const btn = event.target;
      const comment = document.getElementById(`comm-${id}`).value;
      const orig = btn.textContent;
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
      const success = await updateData({ id, type: "إشعار", action: "update_status", comment, done: "تم", updatedAt: new Date().toISOString() });
      if (success) {
        loadNotifications();
      } else {
        alert("⚠️ فشل في تحديث الحالة");
        btn.disabled = false;
        btn.textContent = orig;
      }
    }
  </script>
</body>
</html>
