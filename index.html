<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>نظام صيدليات د. إبراهيم حمدي</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      direction: rtl;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    /* Decorative background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(56,189,248,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 80%, rgba(34,197,94,0.08) 0%, transparent 50%);
    }
    .login-wrap {
      position: relative;
      width: 100%;
      max-width: 380px;
    }
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-icon {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #38bdf8, #0284c7);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 1.8rem;
      color: #fff;
      box-shadow: 0 8px 24px rgba(56,189,248,0.4);
    }
    .login-title { font-size: 1.4rem; font-weight: 900; color: #f8fafc; }
    .login-sub { font-size: 0.85rem; color: #64748b; margin-top: 6px; }
    .login-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      color: #94a3b8;
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .field-wrap { position: relative; }
    .field-wrap i {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: #475569;
      font-size: 0.9rem;
    }
    .field input {
      width: 100%;
      padding: 12px 38px 12px 14px;
      background: #0f172a;
      border: 1.5px solid #334155;
      border-radius: 10px;
      color: #f1f5f9;
      font-family: 'Tajawal', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #38bdf8; }
    .field input::placeholder { color: #475569; }
    .btn-login {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #38bdf8, #0284c7);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Tajawal', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-login:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(56,189,248,0.4); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .error-msg {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-top: 14px;
      display: none;
      text-align: center;
    }
    .error-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-header">
      <div class="login-icon"><i class="fas fa-clinic-medical"></i></div>
      <div class="login-title">صيدليات د. إبراهيم حمدي</div>
      <div class="login-sub">نظام إدارة الفروع الداخلي</div>
    </div>
    <div class="login-card">
      <div class="field">
        <label><i class="fas fa-user" style="margin-left:5px;"></i> اسم المستخدم</label>
        <div class="field-wrap">
          <i class="fas fa-user"></i>
          <input type="text" id="username" placeholder="أدخل اسم المستخدم" autocomplete="username">
        </div>
      </div>
      <div class="field">
        <label><i class="fas fa-lock" style="margin-left:5px;"></i> كلمة المرور</label>
        <div class="field-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter') handleLogin()">
        </div>
      </div>
      <button class="btn-login" id="loginBtn" onclick="handleLogin()">
        <i class="fas fa-sign-in-alt"></i> دخول
      </button>
      <div class="error-msg" id="error-msg"></div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    async function handleLogin() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('error-msg');

      err.classList.remove('show');
      if (!user || !pass) { showErr("برجاء إدخال بيانات الدخول"); return; }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';

      const result = await login(user, pass);

      if (result && (result.success || result.status === "success")) {
localStorage.setItem('userBranch', result.branch || result.user);
localStorage.setItem('activeUser', result.user);
localStorage.setItem('authToken',  result.token);
localStorage.setItem('loginTime',  Date.now());
        btn.innerHTML = '<i class="fas fa-check"></i> تم الدخول...';
        window.location.replace("main.html");
      } else {
        showErr(result.message || "بيانات الدخول غير صحيحة");
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> دخول';
      }
    }

    function showErr(msg) {
      const el = document.getElementById('error-msg');
      el.textContent = msg;
      el.classList.add('show');
    }
  </script>
</body>
</html>
