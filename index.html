<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول نظام صيدليات د. إبراهيم</title>
    <!-- استدعاء مكتبة الأيقونات لشكل أكثر احترافية -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg-gradient); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }

        .login-box { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            width: 90%; 
            max-width: 360px; 
            text-align: center; 
            transition: transform 0.3s ease;
        }

        .login-box:hover {
            transform: translateY(-5px);
        }

        .logo-icon {
            font-size: 3rem;
            color: var(--accent-color);
            margin-bottom: 15px;
        }

        h2 { 
            color: var(--primary-color); 
            margin-bottom: 25px; 
            font-size: 1.5rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        input { 
            width: 100%; 
            padding: 14px 45px 14px 12px; 
            border: 1px solid #e2e8f0; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--accent-color);
        }

        button { 
            width: 100%; 
            padding: 14px; 
            background: var(--primary-color); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 1.1rem;
            transition: background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover { 
            background: var(--accent-color); 
        }

        button:disabled { 
            background: #cbd5e0; 
            cursor: not-allowed; 
        }

        .footer-text {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #718096;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo-icon">
            <i class="fas fa-pills"></i>
        </div>
        <h2>تسجيل الدخول</h2>
        
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="username" placeholder="اسم المستخدم أو الفرع" autocomplete="username">
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="كلمة المرور" autocomplete="current-password">
        </div>

        <button id="loginBtn" onclick="handleLogin()">
            <span>دخول</span>
            <i class="fas fa-sign-in-alt"></i>
        </button>

        <p class="footer-text">نظام إدارة الصيدليات الذكي © 2026</p>
    </div>

    <script src="api.js"></script>
    <script>
        async function handleLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');

            if (!user || !pass) { 
                alert("برجاء إدخال البيانات كاملة"); 
                return; 
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> جاري التحقق...';

            try {
                // استدعاء دالة الـ login الأصلية من ملف api.js
                const result = await login(user, pass);

                if (result && (result.success || result.status === "success")) {
                    // تخزين بيانات الجلسة
                    localStorage.setItem('userBranch', user);
                    localStorage.setItem('activeUser', user);
                    localStorage.setItem('isLoggedIn', 'true');
                    
                    // التوجيه للوحة التحكم (Dashboard) بدلاً من الجدول مباشرة
                    window.location.replace("main.html");
                } else {
                    alert(result.message || "خطأ في اسم المستخدم أو كلمة المرور");
                    btn.disabled = false;
                    btn.innerHTML = '<span>دخول</span> <i class="fas fa-sign-in-alt"></i>';
                }
            } catch (error) {
                alert("تعذر الاتصال بالسيرفر، تأكد من الإنترنت");
                btn.disabled = false;
                btn.innerHTML = '<span>دخول</span> <i class="fas fa-sign-in-alt"></i>';
            }
        }

        // تفعيل زر الدخول عند الضغط على Enter في الكيبورد
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
</body>
</html>
