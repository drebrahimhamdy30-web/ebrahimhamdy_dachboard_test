<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول نظام الصيدليات</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>تسجيل الدخول</h2>
        <input type="text" id="username" placeholder="اسم المستخدم">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button id="loginBtn" onclick="handleLogin()">دخول</button>
    </div>

    <script src="api.js"></script>
    <script>
        async function handleLogin() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');

            if (!user || !pass) { alert("برجاء إدخال البيانات"); return; }

            btn.disabled = true;
            btn.innerText = "جاري التحقق...";

            const result = await login(user, pass);

            if (result && (result.success || result.status === "success")) {
                localStorage.setItem('userBranch', user);
                localStorage.setItem('activeUser', user);
                localStorage.setItem('isLoggedIn', 'true');
                window.location.replace("main.html");
            } else {
                alert(result.message || "خطأ في بيانات الدخول");
                btn.disabled = false;
                btn.innerText = "دخول";
            }
        }
    </script>
</body>
</html>
