<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم صيدلية إبراهيم حمدي</title>
    <!-- استيراد المكتبات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- القائمة الجانبية يتم حقنها هنا بواسطة nav.js -->
    <div class="nav-bar"></div>

    <main class="content">
        <header>
            <h1 id="welcome-msg">مرحباً، د. إبراهيم 👋</h1>
            <p id="current-date"></p>
        </header>

        <!-- كروت الإحصائيات -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="info">
                    <h3>نواقص اليوم</h3>
                    <p id="shortage-count"><i class="fas fa-spinner fa-spin"></i></p>
                </div>
                <i class="fas fa-clipboards"></i>
            </div>
            <div class="stat-card warning">
                <div class="info">
                    <h3>طلبات معلقة</h3>
                    <p id="pending-count"><i class="fas fa-spinner fa-spin"></i></p>
                </div>
                <i class="fas fa-clock"></i>
            </div>
        </div>

        <!-- قسم الرسم البياني مع حاوية محددة الارتفاع -->
        <div class="chart-container" style="position: relative; height:40vh; width:100%; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
            <h3 style="margin-bottom: 15px;">معدل النواقص خلال الأسبوع</h3>
            <canvas id="myChart"></canvas>
        </div>
    </main>

    <!-- الملفات البرمجية -->
    <script src="api.js"></script>
    <script src="nav.js"></script>
    <script>
        // 1. تأمين الصفحة وتحديث التاريخ
        const user = checkAuth(); // التأكد من هوية المستخدم
        if(user) {
            document.getElementById('welcome-msg').innerText = `مرحباً، ${user} 👋`;
        }

        document.getElementById('current-date').innerText = new Date().toLocaleDateString('ar-EG', { 
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
        });

        async function initDashboard() {
            try {
                // 2. جلب البيانات الحقيقية
                const orders = await fetchOrders(); 
                
                if (orders && Array.isArray(orders)) {
                    document.getElementById('shortage-count').innerText = orders.length;
                    // تأكد أن الحالة في الشيت مكتوبة 'pending'
                    const pendingOrders = orders.filter(o => o.state === 'pending' || o.state === 'معلق');
                    document.getElementById('pending-count').innerText = pendingOrders.length;
                }

                // 3. إعداد الرسم البياني
                const ctx = document.getElementById('myChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['السبت', 'الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة'],
                        datasets: [{
                            label: 'عدد النواقص',
                            data: [12, 19, 3, 5, 2, 15, 10], 
                            borderColor: '#3498db',
                            backgroundColor: 'rgba(52, 152, 219, 0.1)',
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'bottom' }
                        }
                    }
                });
            } catch (e) {
                console.error("Dashboard Load Error:", e);
                document.getElementById('shortage-count').innerText = "!";
                document.getElementById('pending-count').innerText = "!";
            }
        }

        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
