<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>إضافة طلب - صيدليات د. إبراهيم</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    .form-card { max-width: 640px; margin: 0 auto; }

    .type-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    @media(max-width:480px){ .type-grid { grid-template-columns: repeat(2, 1fr); } }

    .type-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 14px 8px;
      border: 2px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--surface-2);
      cursor: pointer;
      transition: all 0.2s;
      font-family: var(--font);
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-secondary);
      line-height: 1.3;
      text-align: center;
    }
    .type-btn i { font-size: 1.2rem; }
    .type-btn.active { border-color: var(--accent); background: #e0f2fe; color: var(--accent-dark); }
    .type-btn:hover { border-color: var(--accent); }

    .form-section { display: none; }
    .form-section.visible { display: block; }

    .field-group { margin-bottom: 16px; }
    .field-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }
    .field-icon-wrap { position: relative; }
    .field-icon-wrap i.field-icon {
      position: absolute;
      right: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.85rem;
      pointer-events: none;
    }
    .field-icon-wrap input, .field-icon-wrap select { padding-right: 34px; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media(max-width:480px){ .grid-2 { grid-template-columns: 1fr; } }

    .btn-submit-full {
      width: 100%;
      padding: 15px;
      background: var(--success);
      color: #fff;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .btn-submit-full:hover:not(:disabled) { background: #16a34a; transform: translateY(-1px); }
    .btn-submit-full:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; }

    /* Missing items table */
    .items-table { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 0.85rem; }
    .items-table th { background: var(--surface-3); padding: 8px; font-size: 0.78rem; color: var(--text-secondary); border-bottom: 2px solid var(--border); text-align: center; }
    .items-table td { padding: 7px 5px; border-bottom: 1px solid var(--surface-3); vertical-align: middle; }
    .btn-add-row {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 16px; background: var(--surface-3);
      border: 1.5px dashed var(--border); border-radius: var(--radius-sm);
      font-family: var(--font); font-size: 0.82rem; font-weight: 600;
      color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
      width: 100%; justify-content: center; margin-bottom: 16px;
    }
    .btn-add-row:hover { border-color: var(--accent); color: var(--accent-dark); background: #e0f2fe; }
    .btn-remove-row { background: none; border: none; color: var(--danger); cursor: pointer; padding: 4px 8px; font-size: 1rem; }

    /* Alert */
    .alert-block {
      background: #fee2e2;
      border: 1.5px solid #fca5a5;
      border-radius: var(--radius-md);
      padding: 14px 16px;
      margin-bottom: 16px;
      display: none;
      align-items: flex-start;
      gap: 10px;
    }
    .alert-block.show { display: flex; }
    .alert-block i { color: var(--danger); font-size: 1.2rem; flex-shrink: 0; margin-top: 2px; }
    .alert-block p { color: #991b1b; font-weight: 600; font-size: 0.9rem; margin: 0; line-height: 1.5; }

    /* Toast */
    .success-toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #166534; color: #dcfce7;
      padding: 12px 24px; border-radius: 30px;
      font-weight: 700; font-size: 0.9rem;
      opacity: 0; transition: all 0.3s; z-index: 9999; white-space: nowrap;
    }
    .success-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .readonly-field {
      background: var(--surface-3);
      color: var(--text-secondary);
      border-color: var(--border);
      cursor: not-allowed;
    }
    .date-display {
      padding: 10px 12px;
      background: var(--surface-3);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="nav-bar"></div>
  <div class="container">
    <div class="card form-card">
      <div class="page-header">
        <div class="page-title"><i class="fas fa-plus-circle"></i> طلب جديد</div>
      </div>

      <!-- Type Selector -->
      <div class="type-grid">
        <button class="type-btn active" onclick="setType('شراء', this)">
          <i class="fas fa-shopping-cart" style="color:#f59e0b;"></i> طلب شراء
        </button>
        <button class="type-btn" onclick="setType('تحويل', this)">
          <i class="fas fa-exchange-alt" style="color:#38bdf8;"></i> تحويل
        </button>
        <button class="type-btn" onclick="setType('جرد', this)">
          <i class="fas fa-clipboard-list" style="color:#22c55e;"></i> جرد
        </button>
        <button class="type-btn" onclick="setType('إشعار', this)">
          <i class="fas fa-bell" style="color:#a855f7;"></i> إشعار
        </button>
        <button class="type-btn" onclick="setType('تعاقد', this)">
          <i class="fas fa-file-contract" style="color:#0ea5e9;"></i> فاتورة تعاقد
        </button>
        <button class="type-btn" onclick="setType('عدم_وصول', this)">
          <i class="fas fa-truck" style="color:#ef4444;"></i> لم يصل من الشركات
        </button>
      </div>

      <!-- ===== قسم: شراء / تحويل / جرد / إشعار ===== -->
      <div class="form-section visible" id="section-original">

        <div class="field-group" id="branch-div">
          <label id="branch-label">توجيه إلى فرع</label>
          <div class="field-icon-wrap">
            <i class="fas fa-store field-icon"></i>
            <select id="branch" class="form-select">
              <option value="المعمورة">المعمورة</option>
              <option value="سان ستيفانو">سان ستيفانو</option>
              <option value="سيدى بشر">سيدى بشر</option>
            </select>
          </div>
        </div>

        <div class="form-section visible" id="item-section">
          <div class="grid-2">
            <div class="field-group">
              <label>كود الصنف</label>
              <div class="field-icon-wrap">
                <i class="fas fa-barcode field-icon"></i>
                <input type="text" id="item_code" class="form-input" placeholder="مثال: 102030">
              </div>
            </div>
            <div class="field-group" id="item-name-div">
              <label>اسم الصنف</label>
              <div class="field-icon-wrap">
                <i class="fas fa-capsules field-icon"></i>
                <input type="text" id="item_name" class="form-input" placeholder="اسم الدواء أو المنتج">
              </div>
            </div>
          </div>
        </div>

        <div class="form-section visible" id="extra-section">
          <div class="grid-2">
            <div class="field-group">
              <label>كود العميل</label>
              <div class="field-icon-wrap">
                <i class="fas fa-phone-alt field-icon"></i>
                <input type="text" id="customer_code" class="form-input" placeholder="رقم الموبايل">
              </div>
            </div>
            <div class="field-group">
              <label>اسم العميل</label>
              <div class="field-icon-wrap">
                <i class="fas fa-user field-icon"></i>
                <input type="text" id="customer_name" class="form-input" placeholder="اختياري">
              </div>
            </div>
          </div>
          <div class="field-group" style="max-width:200px;">
            <label>الكمية المطلوبة</label>
            <div class="field-icon-wrap">
              <i class="fas fa-sort-numeric-up field-icon"></i>
              <input type="number" id="qty" class="form-input" value="1" min="1">
            </div>
          </div>
        </div>

        <div class="form-section" id="note-section">
          <div class="field-group">
            <label>نص الإشعار / التفاصيل</label>
            <textarea id="note_text" class="form-input" rows="4" placeholder="اكتب التفاصيل هنا..." style="resize:vertical;"></textarea>
          </div>
        </div>

        <button class="btn-submit-full" id="submitBtn" onclick="submitOrder()">
          <i class="fas fa-paper-plane"></i> إرسال الطلب
        </button>
      </div>

      <!-- ===== قسم: فاتورة تعاقد ===== -->
      <div class="form-section" id="section-contract">

        <div class="alert-block" id="block-alert">
          <i class="fas fa-ban"></i>
          <p>هذا العميل غير مسموح له في الوقت الحالي<br>يرجى الرجوع لمدير الفرع</p>
        </div>

        <div class="grid-2">
          <div class="field-group">
            <label><i class="fas fa-store" style="margin-left:5px;"></i> الفرع</label>
            <input type="text" id="contract-branch" class="form-input readonly-field" readonly>
          </div>
          <div class="field-group">
            <label><i class="fas fa-calendar-alt" style="margin-left:5px;"></i> التاريخ</label>
            <div class="date-display" id="contract-date"></div>
          </div>
        </div>

        <div class="field-group">
          <label><i class="fas fa-id-card" style="margin-left:5px;"></i> رقم قيد العميل</label>
          <div class="field-icon-wrap">
            <i class="fas fa-hashtag field-icon"></i>
            <input type="text" id="contract-cust-code" class="form-input" placeholder="أدخل رقم القيد">
          </div>
        </div>

        <div class="field-group">
          <label><i class="fas fa-money-bill-wave" style="margin-left:5px;"></i> إجمالي قيمة الفاتورة</label>
          <div class="field-icon-wrap">
            <i class="fas fa-pound-sign field-icon"></i>
            <input type="number" id="contract-amount" class="form-input" placeholder="0.00" min="0" step="0.01">
          </div>
        </div>

        <div class="field-group">
          <label><i class="fas fa-sticky-note" style="margin-left:5px;"></i> ملاحظات</label>
          <textarea id="contract-notes" class="form-input" rows="3" placeholder="أي ملاحظات إضافية..." style="resize:vertical;"></textarea>
        </div>

        <button class="btn-submit-full" id="contractBtn" onclick="submitContract()">
          <i class="fas fa-file-contract"></i> حفظ فاتورة التعاقد
        </button>
      </div>

      <!-- ===== قسم: لم يصل من الشركات ===== -->
      <div class="form-section" id="section-missing">

        <div class="grid-2" style="margin-bottom:4px;">
          <div class="field-group">
            <label><i class="fas fa-store" style="margin-left:5px;"></i> الفرع</label>
            <input type="text" id="missing-branch" class="form-input readonly-field" readonly>
          </div>
          <div class="field-group">
            <label><i class="fas fa-calendar-alt" style="margin-left:5px;"></i> التاريخ</label>
            <div class="date-display" id="missing-date"></div>
          </div>
        </div>

        <div class="field-group">
          <label><i class="fas fa-file-invoice" style="margin-left:5px;"></i> رقم فاتورة المورد</label>
          <div class="field-icon-wrap">
            <i class="fas fa-hashtag field-icon"></i>
            <input type="text" id="missing-invoice" class="form-input" placeholder="أدخل رقم الفاتورة">
          </div>
        </div>

        <hr class="divider">
        <p style="font-size:0.85rem;font-weight:700;color:var(--text-secondary);margin-bottom:12px;">
          <i class="fas fa-boxes"></i> الأصناف الناقصة
        </p>

        <div class="table-wrap" style="margin-bottom:0;">
          <table class="items-table">
            <thead>
              <tr>
                <th style="width:50%;">اسم الصنف</th>
                <th style="width:30%;">العدد</th>
                <th style="width:20%;"></th>
              </tr>
            </thead>
            <tbody id="items-body">
              <!-- rows added dynamically -->
            </tbody>
          </table>
        </div>

        <button class="btn-add-row" onclick="addItemRow()">
          <i class="fas fa-plus-circle"></i> إضافة صنف
        </button>

        <button class="btn-submit-full" id="missingBtn" onclick="submitMissing()">
          <i class="fas fa-truck"></i> إرسال بلاغ عدم الوصول
        </button>
      </div>

    </div>
  </div>

  <div class="success-toast" id="toast">✅ تم الإرسال بنجاح!</div>

  <script src="api.js"></script>
  <script src="nav.js"></script>
  <script>
// بعد ✅
let activeUser = null;
let userBranch = '';
let currentType = 'شراء';
let rowCount = 0;

checkAuth().then(user => {
  activeUser = user;
  if (user) {
    userBranch = (localStorage.getItem('userBranch') || "المعمورة").trim();
    initDates();
    addItemRow();
    handleTypeInit();
  }
});

    function initDates() {
      const now = new Date();
      const opts = { year: 'numeric', month: 'long', day: 'numeric' };
      const dateStr = now.toLocaleDateString('ar-EG', opts);
      document.getElementById('contract-date').textContent = dateStr;
      document.getElementById('missing-date').textContent = dateStr;
      document.getElementById('contract-branch').value = userBranch;
      document.getElementById('missing-branch').value = userBranch;
    }

    function setType(type, btn) {
      currentType = type;
      document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      handleTypeInit();
    }

    function handleTypeInit() {
      // إخفاء كل الأقسام
      document.getElementById('section-original').classList.remove('visible');
      document.getElementById('section-contract').classList.remove('visible');
      document.getElementById('section-missing').classList.remove('visible');
      document.getElementById('block-alert').classList.remove('show');

      if (currentType === 'تعاقد') {
        document.getElementById('section-contract').classList.add('visible');
        return;
      }
      if (currentType === 'عدم_وصول') {
        document.getElementById('section-missing').classList.add('visible');
        return;
      }

      // الأنواع القديمة
      document.getElementById('section-original').classList.add('visible');

      const branchEl = document.getElementById('branch');
      const branchDiv = document.getElementById('branch-div');
      const branchLabel = document.getElementById('branch-label');
      const itemSection = document.getElementById('item-section');
      const itemNameDiv = document.getElementById('item-name-div');
      const extraSection = document.getElementById('extra-section');
      const noteSection = document.getElementById('note-section');

      [itemSection, extraSection, itemNameDiv, branchDiv].forEach(el => {
        el.classList.remove('form-section');
        el.style.display = '';
      });
      noteSection.classList.remove('visible');
      branchEl.disabled = false;
      branchLabel.textContent = "توجيه إلى فرع";

      if (currentType === "شراء") {
        branchEl.value = userBranch;
        branchEl.disabled = true;
        branchLabel.textContent = "فرع الطلب (ثابت)";
      } else if (currentType === "جرد") {
        itemNameDiv.style.display = 'none';
        extraSection.style.display = 'none';
      } else if (currentType === "إشعار") {
        itemSection.style.display = 'none';
        extraSection.style.display = 'none';
        branchLabel.textContent = "إرسال إلى فرع";
        noteSection.classList.add('visible');
      } else if (currentType === "تحويل") {
        branchLabel.textContent = "طلب تحويل من فرع";
      }
    }

    // ===== الأنواع القديمة =====
    async function submitOrder() {
      const btn = document.getElementById('submitBtn');
      const itemCode = document.getElementById('item_code').value.trim();
      const itemName = document.getElementById('item_name').value.trim();
      if (currentType !== "إشعار" && !itemCode && !itemName) {
        alert("برجاء إدخال كود أو اسم الصنف"); return;
      }
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';
      const payload = {
        action: "insert_order", type: currentType,
        user: activeUser, branch: userBranch,
        target_branch: document.getElementById('branch').value,
        item_code: itemCode, item: itemName,
        customer_code: document.getElementById('customer_code').value.trim(),
        customer_name: document.getElementById('customer_name').value.trim(),
        qty: document.getElementById('qty').value || 1,
        note: document.getElementById('note_text').value.trim(),
        state: 'pending', createdAt: new Date().toISOString()
      };
      try {
        const success = await updateData(payload);
        if (success) { showToast(); resetOriginalForm(); }
        else alert("فشل الإرسال ❌");
      } catch(e) { alert("خطأ في الاتصال"); }
      finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال الطلب';
      }
    }

    // ===== فاتورة تعاقد =====
    async function submitContract() {
      const btn = document.getElementById('contractBtn');
      const custCode = document.getElementById('contract-cust-code').value.trim();
      const amount = document.getElementById('contract-amount').value.trim();
      if (!custCode) { alert("برجاء إدخال رقم قيد العميل"); return; }
      if (!amount) { alert("برجاء إدخال إجمالي قيمة الفاتورة"); return; }

      document.getElementById('block-alert').classList.remove('show');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';

      const payload = {
        type: "تعاقد",
        branch: userBranch,
        cust_code: custCode,
        total_amount: amount,
        notes: document.getElementById('contract-notes').value.trim(),
        createdAt: new Date().toISOString()
      };

      try {
        const response = await fetch("https://agent.ebrahimhamdy.com/webhook/taskmanagement", {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
let data = {};
try {
  const raw = await response.json();
  data = Array.isArray(raw) ? (raw[0] || {}) : raw;
} catch(e) { data = {}; }

        if (data.blocked) {
          document.getElementById('block-alert').classList.add('show');
          document.getElementById('block-alert').scrollIntoView({ behavior: 'smooth', block: 'center' });
        } else if (response.ok) {
          showToast();
          document.getElementById('contract-cust-code').value = '';
          document.getElementById('contract-amount').value = '';
          document.getElementById('contract-notes').value = '';
        } else {
          alert("فشل الحفظ ❌");
        }
      } catch(e) { alert("خطأ في الاتصال"); }
      finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-file-contract"></i> حفظ فاتورة التعاقد';
      }
    }

    // ===== لم يصل من الشركات =====

    function addItemRow() {
      rowCount++;
      const tbody = document.getElementById('items-body');
      const tr = document.createElement('tr');
      tr.id = `item-row-${rowCount}`;
      tr.innerHTML = `
        <td><input type="text" class="table-input item-name-input" placeholder="اسم الصنف"></td>
        <td><input type="number" class="table-input item-qty-input" placeholder="العدد" min="1" value="1"></td>
        <td>
          <button class="btn-remove-row" onclick="removeRow(${rowCount})" title="حذف">
            <i class="fas fa-times-circle"></i>
          </button>
        </td>`;
      tbody.appendChild(tr);
    }

    function removeRow(id) {
      const row = document.getElementById(`item-row-${id}`);
      if (document.getElementById('items-body').children.length <= 1) {
        alert("يجب أن يكون هناك صنف واحد على الأقل"); return;
      }
      if (row) row.remove();
    }

    async function submitMissing() {
      const btn = document.getElementById('missingBtn');
      const invoiceNo = document.getElementById('missing-invoice').value.trim();
      if (!invoiceNo) { alert("برجاء إدخال رقم فاتورة المورد"); return; }

      const rows = document.querySelectorAll('#items-body tr');
      const items = [];
      let valid = true;

      rows.forEach(row => {
        const name = row.querySelector('.item-name-input').value.trim();
        const qty = row.querySelector('.item-qty-input').value.trim();
        if (!name) { valid = false; return; }
        items.push({ item_name: name, qty: qty || '1' });
      });

      if (!valid || items.length === 0) {
        alert("برجاء إدخال اسم الصنف لكل سطر"); return;
      }

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';

      try {
        // إرسال كل صنف كطلب منفصل (سطر في الجدول)
        const promises = items.map(item =>
          updateData({
            type: "عدم_وصول",
            branch: userBranch,
            invoice_no: invoiceNo,
            item_name: item.item_name,
            qty: item.qty,
            createdAt: new Date().toISOString()
          })
        );
        const results = await Promise.all(promises);
        const allOk = results.every(r => r === true);

        if (allOk) {
          showToast();
          document.getElementById('missing-invoice').value = '';
          document.getElementById('items-body').innerHTML = '';
          rowCount = 0;
          addItemRow();
        } else {
          alert("فشل إرسال بعض الأصناف ❌ حاول مرة أخرى");
        }
      } catch(e) { alert("خطأ في الاتصال"); }
      finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-truck"></i> إرسال بلاغ عدم الوصول';
      }
    }

    // ===== Helpers =====
    function showToast() {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    function resetOriginalForm() {
      document.querySelectorAll('#section-original input:not([disabled]), #section-original textarea').forEach(el => el.value = '');
      document.getElementById('qty').value = '1';
    }
  </script>
