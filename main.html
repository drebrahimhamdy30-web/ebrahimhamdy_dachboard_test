<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم صيدلية إبراهيم حمدي</title>
    <!-- استيراد المكتبات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- القائمة الجانبية يتم حقنها هنا بواسطة nav.js -->
    <div class="nav-bar"></div>

    <main class="content">
        <header>
            <h1>مرحباً، د. إبراهيم 👋</h1>
            <p id="current-date"></p>
        </header>

        <!-- كروت الإحصائيات -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="info">
                    <h3>نواقص اليوم</h3>
                    <p id="shortage-count">0</p>
                </div>
                <i class="fas fa-clipboards"></i>
            </div>
            <div class="stat-card warning">
                <div class="info">
                    <h3>طلبات معلقة</h3>
                    <p id="pending-count">0</p>
                </div>
                <i class="fas fa-clock"></i>
            </div>
        </div>

        <!-- قسم الرسم البياني -->
        <div class="chart-container">
            <h3>معدل النواقص خلال الأسبوع</h3>
            <canvas id="myChart"></canvas>
        </div>
    </main>

    <!-- الملفات البرمجية -->
    <script src="api.js"></script>
    <script src="nav.js"></script>
    <script>
        // تحديث التاريخ
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('ar-EG', { 
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
        });

        async function initDashboard() {
            try {
                // استخدام الدوال من api.js
                const orders = await fetchOrders(); 
                document.getElementById('shortage-count').innerText = orders.length;
                document.getElementById('pending-count').innerText = orders.filter(o => o.state === 'pending').length;

                // إعداد الرسم البياني
                const ctx = document.getElementById('myChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['السبت', 'الأحد', 'الاثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة'],
                        datasets: [{
                            label: 'عدد النواقص',
                            data: [12, 19, 3, 5, 2, 15, 10], // يمكن ربطها ببيانات حقيقية لاحقاً
                            borderColor: '#2c3e50',
                            backgroundColor: 'rgba(44, 62, 80, 0.1)',
                            fill: true,
                            tension: 0.4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false
                    }
                });
            } catch (e) {
                console.error("Dashboard Load Error:", e);
            }
        }

        document.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
