<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>سجل الجرد - صيدليات د. إبراهيم</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="nav-bar"></div>
  <div class="container">
    <div class="card">
      <div class="page-header">
        <div class="page-title"><i class="fas fa-clipboard-list"></i> سجل جرد الفروع</div>
        <button class="btn btn-primary" onclick="loadInventory()"><i class="fas fa-sync-alt"></i> تحديث</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>الفرع</th>
              <th>الصنف</th>
              <th>الكمية</th>
              <th>ملاحظة الجرد</th>
              <th>الحالة</th>
              <th>حفظ</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr class="loading-row"><td colspan="7">جاري تحميل بيانات الجرد...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="nav.js"></script>
  <script>
// بعد ✅
let activeUser = null;
let rawData = [];

checkAuth().then(user => {
  activeUser = user;
  if (user) window.onload = loadInventory;
});

    async function loadInventory() {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '<tr class="loading-row"><td colspan="7">جاري جلب البيانات...</td></tr>';
      try {
        const response = await fetchData();
        if (response && response[0] && response[0].data) {
          rawData = response[0].data.filter(item => item.type === "جرد");
          renderTable(rawData);
        } else {
          tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:40px;color:var(--text-muted);">لا توجد عمليات جرد مسجلة</td></tr>';
        }
      } catch(e) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--danger);padding:30px;">خطأ في الاتصال</td></tr>';
      }
    }

    function renderTable(items) {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '';
      items.forEach(item => {
        const currentState = item.state || 'pending';
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td style="color:var(--text-muted);font-size:0.78rem;">${item.id}</td>
          <td><span class="branch-tag">${item.branch || '-'}</span></td>
          <td style="text-align:right;font-weight:700;">${item.item_name || item.item || '-'}</td>
          <td><b style="color:var(--warning);">${item.qty || '0'}</b></td>
          <td><input type="text" class="table-input note-in" value="${item.company || ''}" placeholder="ملاحظة..."></td>
          <td>
            <select class="table-select">
              <option value="pending" ${currentState==='pending'?'selected':''}>⏳ قيد المعالجة</option>
              <option value="completed" ${currentState==='completed'?'selected':''}>✅ تم الجرد</option>
            </select>
          </td>
          <td>
            <button class="btn btn-success btn-sm btn-icon" onclick="saveInventory('${item.id}', this)">
              <i class="fas fa-save"></i>
            </button>
          </td>`;
        tbody.appendChild(tr);
      });
    }

    async function saveInventory(id, btn) {
      const row = btn.closest('tr');
      const status = row.querySelector('select').value;
      const note = row.querySelector('.note-in').value;
      btn.disabled = true;
      const orig = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
      const success = await updateData({ id, status, company: note, type: "جرد", action: "update_status" });
      if (success) {
        btn.style.background = "#16a34a";
        btn.innerHTML = '<i class="fas fa-check"></i>';
        setTimeout(() => loadInventory(), 800);
      } else {
        alert("فشل التحديث ❌");
        btn.disabled = false;
        btn.innerHTML = orig;
      }
    }
  </script>
</body>
</html>
