<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سجل المشتريات - نظام الصيدلية</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #edf2f7; vertical-align: middle; }
        th { background-color: #f8fafc; color: #4a5568; font-weight: 700; border-top: 2px solid #27ae60; }
        tr:hover { background-color: #f7fafc; }
        .stat-sel { padding: 6px; border-radius: 6px; font-size: 0.8rem; border: 1px solid #cbd5e0; background: white; cursor: pointer; }
        .comp-in { padding: 8px; border-radius: 6px; font-size: 0.8rem; border: 1px solid #cbd5e0; width: 90%; transition: 0.3s; }
        .comp-in:focus { border-color: #3498db; outline: none; }
        .btn-save { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .btn-save:hover { background: #218838; transform: translateY(-1px); }
        .data-sub { font-size: 0.75rem; color: #64748b; margin-top: 3px; }
        .data-main { font-weight: 600; color: #1e293b; }
        .badge-branch { background: #e2e8f0; padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; }
        .date-cell { font-size: 0.75rem; color: #64748b; line-height: 1.4; font-weight: bold; }
        .time-text { font-size: 0.7rem; color: #94a3b8; display: block; font-weight: normal; }
    </style>
</head>
<body>
    <div class="nav-bar"></div>

    <div class="container">
        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin: 0; font-size: 1.2rem; color: #2c3e50;">
                    <i class="fas fa-shopping-basket" style="color: #27ae60;"></i> سجل المشتريات والطلبيات
                </h3>
                <button onclick="loadOrders()" style="background: #3498db; padding: 8px 20px; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold;">
                    <i class="fas fa-sync-alt"></i> تحديث
                </button>
            </div>

            <div class="filter-box" style="background: #f8fafc; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #e2e8f0;">
                <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 12px;">
                    <span style="font-weight: bold; color: #64748b;"><i class="fas fa-filter"></i> تصفية بالحالة:</span>
                    <select id="statusFilter" onchange="applyFilter()" class="stat-sel" style="width: 160px;">
                        <option value="all">عرض الكل</option>
                        <option value="pending" selected>قيد الانتظار ⏳</option>
                        <option value="ordered">تم الطلب ✅</option>
                        <option value="unavailable">غير متوفر ❌</option>
                    </select>
                </div>
                <div id="branchList" style="display: flex; gap: 10px; flex-wrap: wrap;"></div>
            </div>

            <div style="overflow-x: auto;">
                <table id="orders-table">
                    <thead>
                        <tr>
                            <th style="width: 12%;">التاريخ والوقت</th>
                            <th style="width: 8%;">الفرع</th>
                            <th style="width: 22%;">بيانات الصنف</th>
                            <th style="width: 18%;">بيانات العميل</th>
                            <th style="width: 7%;">الكمية</th>
                            <th style="width: 18%;">المورد / ملاحظات</th>
                            <th style="width: 10%;">الحالة</th>
                            <th style="width: 5%;">حفظ</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="8" style="text-align:center; padding: 40px; color: #94a3b8;">جاري تحميل البيانات...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script src="nav.js"></script>
    <script>
        const activeUser = checkAuth();
        let rawData = [];

        if (activeUser) {
            window.onload = loadOrders;
        }

        async function loadOrders() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:30px;">⏳ جاري جلب البيانات...</td></tr>';
            
            try {
                const response = await fetchOrders();
                let items = (response && response[0]?.data) ? response[0].data : (response.data || response);

                if (Array.isArray(items) && items.length > 0) {
                    rawData = items.map(item => ({
                        id: item.id || item.row_id || item.ID,
                        branch: item.branch || '-',
                        item_code: item.item_code || 'بدون كود',
                        item_name: item.item || item.item_name || 'صنف غير مسمى',
                        customer_code: item.cust_code || '---',
                        customer_name: item.cust_name || 'عميل عام',
                        qty: item.qty || 0,
                        company: (item.company && item.company !== 'null') ? item.company : '',
                        // توحيد الحقل ليكون status دائماً
                        status: (item.status === '-' || !item.status) ? (item.state || 'pending') : item.status, 
                        type: item.type || '',
                        createdAt: item.createdAt 
                    })).filter(i => String(i.type).includes("شراء"));

                    generateBranches(rawData);
                    applyFilter();
                } else {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:30px;">لا توجد طلبات شراء</td></tr>';
                }
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#e74c3c; padding:30px;">❌ خطأ في تحميل البيانات</td></tr>';
            }
        }

        function generateBranches(data) {
            const container = document.getElementById('branchList');
            const branches = [...new Set(data.map(i => i.branch))].filter(b => b !== '-').sort();
            container.innerHTML = branches.map(b => `
                <label style="font-size: 0.8rem; background: white; padding: 6px 12px; border-radius: 20px; cursor: pointer; border: 1px solid #cbd5e0; display: flex; align-items: center; gap: 6px;">
                    <input type="checkbox" class="branch-cb" value="${b}" checked onchange="applyFilter()"> ${b}
                </label>
            `).join('');
        }

        function applyFilter() {
            const statusVal = document.getElementById('statusFilter').value;
            const selectedBranches = Array.from(document.querySelectorAll('.branch-cb:checked')).map(c => c.value);
            
            const filtered = rawData.filter(i => {
                const sMatch = (statusVal === 'all' || i.status === statusVal);
                const bMatch = selectedBranches.includes(i.branch);
                return sMatch && bMatch;
            });
            renderTable(filtered);
        }

        function renderTable(items) {
            const tbody = document.getElementById('table-body');
            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding: 30px; color: #64748b;">لا توجد نتائج تطابق التصفية</td></tr>';
                return;
            }

            tbody.innerHTML = items.map(i => {
                let displayDate = "---";
                let displayTime = "";
                if (i.createdAt) {
                    const dateObj = new Date(i.createdAt);
                    displayDate = dateObj.toLocaleDateString('ar-EG', {month:'numeric', day:'numeric'});
                    displayTime = dateObj.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit', hour12:true});
                }

                return `
                    <tr>
                        <td class="date-cell">
                            <div>${displayDate}</div>
                            <span class="time-text">${displayTime}</span>
                        </td>
                        <td><span class="badge-branch">${i.branch}</span></td>
                        <td style="text-align:right;">
                            <div class="data-main">${i.item_name}</div>
                            <div class="data-sub"><i class="fas fa-barcode"></i> ${i.item_code}</div>
                        </td>
                        <td style="text-align:right;">
                            <div class="data-main">${i.customer_name}</div>
                            <div class="data-sub"><i class="fas fa-phone-alt"></i> ${i.customer_code}</div>
                        </td>
                        <td><b style="color:#e67e22; font-size:1.1rem;">${i.qty}</b></td>
                        <td><input type="text" value="${i.company}" id="comp-${i.id}" class="comp-in"></td>
                        <td>
                            <select id="stat-${i.id}" class="stat-sel">
                                <option value="pending" ${i.status==='pending'?'selected':''}>⏳ انتظار</option>
                                <option value="ordered" ${i.status==='ordered'?'selected':''}>✅ تم الطلب</option>
                                <option value="unavailable" ${i.status==='unavailable'?'selected':''}>❌ نقص</option>
                            </select>
                        </td>
                        <td><button class="btn-save" onclick="saveRow('${i.id}', this)"><i class="fas fa-save"></i></button></td>
                    </tr>
                `;
            }).join('');
        }

async function saveRow(id, btn) {
    const currentStatus = document.getElementById(`stat-${id}`).value;
    const currentCompany = document.getElementById(`comp-${id}`).value;
    
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

    const success = await updateData({ 
        id: id, 
        status: currentStatus, 
        company: currentCompany, 
        type: "شراء", 
        action: "update_status" 
    });

    if (success) {
        // 1. تغيير شكل الزر ليعطي مؤشر نجاح
        btn.style.background = "#2ecc71";
        btn.innerHTML = '<i class="fas fa-check"></i> تم';

        // 2. تحديث البيانات في المصفوفة (rawData) عشان لما يفلتر يقرأ الحالة الجديدة
        const item = rawData.find(x => x.id == id);
        if(item) { 
            item.status = currentStatus; 
            item.company = currentCompany; 
        }

        // 3. (الجزء الأهم) الانتظار ثانية ثم إعادة تطبيق الفلتر
        // هذا السطر هو المسؤول عن "إخفاء" الصنف إذا لم يعد مطابقاً للفلتر الحالي
        setTimeout(() => {
            applyFilter(); 
        }, 1000);

    } else {
        alert("⚠️ فشل في الحفظ");
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i>';
    }
}
    </script>
</body>
</html>
