<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>سجل المشتريات - صيدليات د. إبراهيم</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="nav-bar"></div>
  <div class="container">
    <div class="card">
      <div class="page-header">
        <div class="page-title"><i class="fas fa-shopping-cart"></i> سجل المشتريات والطلبيات</div>
        <button class="btn btn-primary" onclick="loadOrders()"><i class="fas fa-sync-alt"></i> تحديث</button>
      </div>

      <div class="filter-bar">
        <span class="filter-label"><i class="fas fa-filter"></i> الحالة:</span>
        <select id="statusFilter" class="form-select" style="width:auto;" onchange="applyFilter()">
          <option value="all">الكل</option>
          <option value="pending" selected>قيد الانتظار ⏳</option>
          <option value="ordered">تم الطلب ✅</option>
          <option value="unavailable">غير متوفر ❌</option>
        </select>
        <div id="branchList" style="display:flex; gap:8px; flex-wrap:wrap; margin-right:4px;"></div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>التاريخ</th>
              <th>الفرع</th>
              <th>الصنف</th>
              <th>العميل</th>
              <th>الكمية</th>
              <th>المورد</th>
              <th>الحالة</th>
              <th>حفظ</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr class="loading-row"><td colspan="8">⏳ جاري تحميل البيانات...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="nav.js"></script>
  <script>
// بعد ✅
let activeUser = null;
let rawData = [];
checkAuth().then(user => {
  activeUser = user;
  if (user) window.onload = loadOrders;
});

    async function loadOrders() {
      const tbody = document.getElementById('table-body');
      tbody.innerHTML = '<tr class="loading-row"><td colspan="8">⏳ جاري جلب البيانات...</td></tr>';
      try {
        const response = await fetchOrders();
        let items = (response && response[0]?.data) ? response[0].data : (response.data || response);
        if (Array.isArray(items) && items.length > 0) {
          rawData = items.map(item => ({
            id: item.id || item.row_id || item.ID,
            branch: item.branch || '-',
            item_code: item.item_code || 'بدون كود',
            item_name: item.item || item.item_name || 'صنف غير مسمى',
            customer_code: item.cust_code || '---',
            customer_name: item.cust_name || 'عميل عام',
            qty: item.qty || 0,
            company: (item.company && item.company !== 'null') ? item.company : '',
            status: (item.status === '-' || !item.status) ? (item.state || 'pending') : item.status,
            type: item.type || '',
            createdAt: item.createdAt
          })).filter(i => String(i.type).includes("شراء"));
          generateBranches(rawData);
          applyFilter();
        } else {
          tbody.innerHTML = '<tr><td colspan="8" class="empty-state">لا توجد طلبات شراء</td></tr>';
        }
      } catch(e) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--danger);padding:30px;">❌ خطأ في تحميل البيانات</td></tr>';
      }
    }

    function generateBranches(data) {
      const container = document.getElementById('branchList');
      const branches = [...new Set(data.map(i => i.branch))].filter(b => b !== '-').sort();
      container.innerHTML = branches.map(b => `
        <label class="check-label" style="background:var(--surface-3);padding:5px 10px;border-radius:20px;border:1px solid var(--border);">
          <input type="checkbox" class="branch-cb" value="${b}" checked onchange="applyFilter()"> ${b}
        </label>
      `).join('');
    }

    function applyFilter() {
      const statusVal = document.getElementById('statusFilter').value;
      const selectedBranches = Array.from(document.querySelectorAll('.branch-cb:checked')).map(c => c.value);
      const filtered = rawData.filter(i => {
        const sMatch = (statusVal === 'all' || i.status === statusVal);
        const bMatch = selectedBranches.includes(i.branch);
        return sMatch && bMatch;
      });
      renderTable(filtered);
    }

    function renderTable(items) {
      const tbody = document.getElementById('table-body');
      if (items.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:var(--text-muted);">لا توجد نتائج تطابق التصفية</td></tr>';
        return;
      }
      tbody.innerHTML = items.map(i => {
        let displayDate = "---", displayTime = "";
        if (i.createdAt) {
          const d = new Date(i.createdAt);
          displayDate = d.toLocaleDateString('ar-EG', {month:'numeric', day:'numeric'});
          displayTime = d.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit', hour12:true});
        }
        return `
          <tr>
            <td style="font-size:0.75rem;line-height:1.4;">${displayDate}<br><span style="color:var(--text-muted);font-size:0.7rem;">${displayTime}</span></td>
            <td><span class="branch-tag">${i.branch}</span></td>
            <td style="text-align:right;">
              <div style="font-weight:700;font-size:0.85rem;">${i.item_name}</div>
              <div style="font-size:0.72rem;color:var(--text-muted);"><i class="fas fa-barcode"></i> ${i.item_code}</div>
            </td>
            <td style="text-align:right;">
              <div style="font-weight:600;font-size:0.82rem;">${i.customer_name}</div>
              <div style="font-size:0.72rem;color:var(--text-muted);"><i class="fas fa-phone-alt"></i> ${i.customer_code}</div>
            </td>
            <td><b style="font-size:1.1rem;color:var(--warning);">${i.qty}</b></td>
            <td><input type="text" value="${i.company}" id="comp-${i.id}" class="table-input" placeholder="المورد..."></td>
            <td>
              <select id="stat-${i.id}" class="table-select">
                <option value="pending" ${i.status==='pending'?'selected':''}>⏳ انتظار</option>
                <option value="ordered" ${i.status==='ordered'?'selected':''}>✅ تم الطلب</option>
                <option value="unavailable" ${i.status==='unavailable'?'selected':''}>❌ نقص</option>
              </select>
            </td>
            <td>
              <button class="btn btn-success btn-sm btn-icon" onclick="saveRow('${i.id}', this)">
                <i class="fas fa-save"></i>
              </button>
            </td>
          </tr>`;
      }).join('');
    }

    async function saveRow(id, btn) {
      const currentStatus = document.getElementById(`stat-${id}`).value;
      const currentCompany = document.getElementById(`comp-${id}`).value;
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
      const success = await updateData({ id, status: currentStatus, company: currentCompany, type: "شراء", action: "update_status" });
      if (success) {
        btn.style.background = "#16a34a";
        btn.innerHTML = '<i class="fas fa-check"></i>';
        const item = rawData.find(x => x.id == id);
        if (item) { item.status = currentStatus; item.company = currentCompany; }
        setTimeout(() => applyFilter(), 1000);
      } else {
        alert("⚠️ فشل في الحفظ");
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i>';
      }
    }
  </script>
</body>
</html>
