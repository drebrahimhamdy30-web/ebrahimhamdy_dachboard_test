<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمة العملاء - الإجراءات السريعة</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .cs-select { 
            width: 100%; padding: 8px; border-radius: 6px; 
            border: 1px solid #ddd; font-family: inherit;
        }
        .btn-done { 
            background: #27ae60; color: white; border: none; 
            padding: 10px 20px; border-radius: 8px; cursor: pointer; width: 100%;
            font-weight: bold;
        }
        .row-done { background-color: #f8fafc; opacity: 0.8; }
        
        @media (max-width: 768px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { 
                background: white; margin-bottom: 15px; 
                border-radius: 12px; padding: 15px; 
                box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
            }
            td { 
                border: none; position: relative; padding-right: 45%; 
                text-align: left; margin-bottom: 10px; font-size: 0.9rem;
                min-height: 30px;
            }
            td:before {
                position: absolute; right: 10px; width: 40%; 
                font-weight: bold; color: var(--primary-color);
                content: attr(data-label); text-align: right;
            }
        }
    </style>
</head>
<body>

    <!-- تم تعديل الكلاس ليتوافق مع ملف nav.js الموحد -->
    <div class="nav-bar"></div>

    <main class="content">
        <header style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 20px;">
            <div>
                <h1>معالجة طلبات فرع <span id="display-branch" style="color: var(--accent-color);">...</span></h1>
                <p>مراجعة ردود المشتريات وإبلاغ العملاء</p>
            </div>
            <button onclick="loadCSData()" class="stat-card" style="padding: 10px 20px; cursor: pointer; border: none; background: white; border-radius: 10px;">
                <i class="fas fa-sync-alt" style="margin-left: 8px;"></i> تحديث البيانات
            </button>
        </header>

        <div class="stat-card" style="margin-bottom: 20px; border-right: 5px solid #f39c12; background: white; padding: 15px; border-radius: 12px;">
            <label style="cursor: pointer; display: flex; align-items: center; gap: 10px;">
                <input type="checkbox" id="hideDone" checked onchange="renderItems()" style="width: 20px; height: 20px;"> 
                <b>إخفاء الطلبات التي تم إبلاغها مسبقاً</b>
            </label>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>الصنف</th>
                        <th>العميل</th>
                        <th>رد المشتريات</th>
                        <th>الحالة</th>
                        <th>إجراء خدمة العملاء</th>
                        <th>حفظ</th>
                    </tr>
                </thead>
                <tbody id="data-list">
                    <tr><td colspan="6" style="padding: 40px; text-align: center;">⏳ جاري جلب البيانات...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="api.js"></script>
    <script src="nav.js"></script>
    <script>
        const activeUser = checkAuth();
        // الحصول على الفرع من التخزين المحلي لضمان دقة البيانات
        const userBranch = localStorage.getItem('userBranch') || "المعمورة";
        document.getElementById('display-branch').innerText = userBranch;
        
        let allItems = [];

        if (activeUser) { window.onload = loadCSData; }

        async function loadCSData() {
            const tbody = document.getElementById('data-list');
            try {
                const response = await fetchOrders(); 
                // معالجة هيكل البيانات القادم من n8n
                allItems = (response[0]?.data) ? response[0].data : (response.data || response);
                renderItems();
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="6" style="color:red; padding:20px; text-align: center;">❌ فشل الاتصال بالسيرفر</td></tr>';
            }
        }

        function renderItems() {
            const tbody = document.getElementById('data-list');
            const hideDone = document.getElementById('hideDone').checked;
            
            const filtered = allItems.filter(item => {
                const itemUser = String(item.user || "").trim();
                const isMyBranch = (itemUser === String(userBranch).trim());
                
                // الحالات التي تظهر لخدمة العملاء (تم طلبها، غير متوفرة، أو محولة)
                const validStates = ['ordered', 'unavailable', 'transferred'];
                const isResponded = validStates.includes(String(item.state || "").trim().toLowerCase());
                
                // التحقق هل تم اتخاذ إجراء سابق
                const hasAction = (item.cust_state && item.cust_state !== "" && item.cust_state !== "null");

                if (hideDone && hasAction) return false;
                return isMyBranch && isResponded;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="padding:50px; color:#94a3b8; text-align: center;">🎉 لا توجد طلبات معلقة حالياً لفرع ${userBranch}</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(item => {
                const currentAction = (item.cust_state && item.cust_state !== "null") ? item.cust_state : "";
                const isDone = (currentAction !== "");
                const stateText = String(item.state || "").trim().toLowerCase();

                // تحديد لون الـ Pill بناءً على الحالة
                const statusColor = stateText === 'ordered' ? '#dcfce7' : (stateText === 'transferred' ? '#e0f2fe' : '#fee2e2');
                const textColor = stateText === 'ordered' ? '#166534' : (stateText === 'transferred' ? '#0369a1' : '#991b1b');
                const label = stateText === 'ordered' ? 'تم الطلب' : (stateText === 'transferred' ? 'محول' : 'غير متوفر');

                return `
                    <tr class="${isDone ? 'row-done' : ''}">
                        <td data-label="الصنف" style="text-align:right;"><b>${item.item_name || item.item || 'صنف غير مسمى'}</b></td>
                        <td data-label="العميل">${item.cust_name || '---'}</td>
                        <td data-label="رد المشتريات"><small>${item.company || 'لا توجد ملاحظات'}</small></td>
                        <td data-label="الحالة">
                            <span class="status-pill" style="padding: 5px 10px; border-radius: 12px; font-size: 0.8rem; background: ${statusColor}; color: ${textColor}; font-weight: bold;">
                                ${label}
                            </span>
                        </td>
                        <td data-label="الإجراء">
                            <select id="select-${item.id}" class="cs-select" ${isDone ? 'disabled' : ''}>
                                <option value="" disabled ${currentAction === "" ? 'selected' : ''}>اختر إجراء...</option>
                                <option value="متوفر وتم ابلاغ العميل" ${currentAction === 'متوفر وتم ابلاغ العميل' ? 'selected' : ''}>متوفر وتم ابلاغ العميل ✅</option>
                                <option value="غير متوفر يحتاج متابعة" ${currentAction === 'غير متوفر يحتاج متابعة' ? 'selected' : ''}>غير متوفر يحتاج متابعة 🔍</option>
                                <option value="إلغاء لعدم التوفر" ${currentAction === 'إلغاء لعدم التوفر' ? 'selected' : ''}>إلغاء لعدم التوفر ❌</option>
                            </select>
                        </td>
                        <td data-label="حفظ">
                            ${!isDone ? 
                                `<button onclick="submitCSAction(event, '${item.id}')" class="btn-done">حفظ الإجراء</button>` : 
                                `<span style="color:#27ae60; font-weight:bold;"><i class="fas fa-check-circle"></i> تم الإبلاغ</span>`
                            }
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function submitCSAction(event, id) {
            const btn = event.target;
            const decision = document.getElementById(`select-${id}`).value;
            if (!decision) { alert("برجاء اختيار إجراء أولاً"); return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الحفظ...';

            const success = await updateData({
                id: id,
                type: "cs_action", 
                decision: decision,
                updatedAt: new Date().toISOString()
            });

            if (success) {
                // إعادة جلب البيانات لتحديث القائمة فوراً
                loadCSData(); 
            } else {
                alert("⚠️ فشل الاتصال بالسيرفر، حاول مرة أخرى");
                btn.disabled = false;
                btn.innerText = "حفظ الإجراء";
            }
        }
    </script>
</body>
</html>
