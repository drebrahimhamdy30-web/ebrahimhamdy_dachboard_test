<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>خدمة العملاء - صيدليات د. إبراهيم</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="nav-bar"></div>
  <div class="container">
    <div class="card">
      <div class="page-header">
        <div class="page-title">
          <i class="fas fa-headset"></i> معالجة طلبات
          <span class="highlight" id="display-branch">...</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <label class="check-label">
            <input type="checkbox" id="hideDone" checked onchange="renderItems()"> إخفاء المنفذ
          </label>
          <button class="btn btn-primary" onclick="loadCSData()"><i class="fas fa-sync-alt"></i> تحديث</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>الصنف</th>
              <th>العميل</th>
              <th>رد المشتريات</th>
              <th>الحالة</th>
              <th>إجراء خدمة العملاء</th>
              <th>حفظ</th>
            </tr>
          </thead>
          <tbody id="data-list">
            <tr class="loading-row"><td colspan="6">جاري التحميل...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="nav.js"></script>
  <script>
// بعد ✅
let activeUser = null;
let userBranch = '';
let allItems = [];

checkAuth().then(user => {
  activeUser = user;
  if (user) {
    userBranch = (localStorage.getItem('userBranch') || '').trim();
    document.getElementById('display-branch').textContent = userBranch;
    window.onload = loadCSData;
  }
});

    async function loadCSData() {
      try {
        const response = await fetchOrders();
        allItems = (response[0]?.data) ? response[0].data : (response.data || response);
        renderItems();
      } catch(e) {
        document.getElementById('data-list').innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--danger);padding:30px;">❌ فشل الاتصال</td></tr>';
      }
    }

    function renderItems() {
      const tbody = document.getElementById('data-list');
      const hideDone = document.getElementById('hideDone').checked;
      const filtered = allItems.filter(item => {
        const isMyBranch = (String(item.user).trim() === String(userBranch).trim());
        const validStates = ['ordered', 'unavailable', 'transferred'];
        const isResponded = validStates.includes(String(item.state || "").trim().toLowerCase());
        const hasAction = (item.cust_state && item.cust_state !== "" && item.cust_state !== "null");
        if (hideDone && hasAction) return false;
        return isMyBranch && isResponded;
      });

      if (filtered.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted);">لا توجد طلبات معلقة لفرع ${userBranch}</td></tr>`;
        return;
      }

      tbody.innerHTML = filtered.map(item => {
        const currentAction = (item.cust_state && item.cust_state !== "null") ? item.cust_state : "";
        const isDone = (currentAction !== "");
        const s = String(item.state || "").trim().toLowerCase();
        return `
          <tr class="${isDone ? 'row-done' : ''}">
            <td style="text-align:right;font-weight:700;">${item.item_name || item.item || 'صنف غير مسمى'}</td>
            <td style="font-size:0.82rem;">${item.cust_name || '---'}</td>
            <td><small style="color:var(--text-secondary);">${item.company || '---'}</small></td>
            <td>
              <span class="badge ${s === 'ordered' ? 'badge-green' : 'badge-red'}">
                ${s === 'ordered' ? 'تم الطلب' : (s === 'transferred' ? 'محول' : 'غير متوفر')}
              </span>
            </td>
            <td>
              <select id="select-${item.id}" class="table-select" ${isDone ? 'disabled' : ''}>
                <option value="" disabled ${currentAction === "" ? 'selected' : ''}>اختر إجراء...</option>
                <option value="متوفر وتم ابلاغ العميل" ${currentAction === 'متوفر وتم ابلاغ العميل' ? 'selected' : ''}>متوفر وتم ابلاغ العميل ✅</option>
                <option value="غير متوفر يحتاج متابعة" ${currentAction === 'غير متوفر يحتاج متابعة' ? 'selected' : ''}>غير متوفر يحتاج متابعة 🔍</option>
                <option value="إلغاء لعدم التوفر" ${currentAction === 'إلغاء لعدم التوفر' ? 'selected' : ''}>إلغاء لعدم التوفر ❌</option>
              </select>
            </td>
            <td>
              ${!isDone
                ? `<button class="btn btn-success btn-sm" onclick="submitCSAction(event, '${item.id}')">تم</button>`
                : `<span style="color:var(--success);font-weight:bold;"><i class="fas fa-check-circle"></i></span>`}
            </td>
          </tr>`;
      }).join('');
    }

    async function submitCSAction(event, id) {
      const btn = event.target;
      const decision = document.getElementById(`select-${id}`).value;
      if (!decision) { alert("برجاء اختيار إجراء من القائمة"); return; }
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
      const success = await updateData({ id, type: "cs_action", decision, done: "تم", updatedAt: new Date().toISOString() });
      if (success) {
        loadCSData();
      } else {
        alert("⚠️ فشل التحديث");
        btn.disabled = false;
        btn.textContent = "تم";
      }
    }
  </script>
</body>
</html>
