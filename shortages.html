<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>متابعة النواقص - صيدليات د. إبراهيم</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="nav-bar"></div>
  <div class="container">
    <div class="card">
      <div class="page-header">
        <div class="page-title">
          <i class="fas fa-exclamation-triangle" style="color:var(--warning);"></i>
          متابعة النواقص: <span class="highlight" id="current-branch-name">...</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <label class="check-label">
            <input type="checkbox" id="show-all-completed" onchange="applyFilters()">
            إظهار المكتمل أيضاً
          </label>
          <button class="btn btn-primary" onclick="loadShortages(true)">
            <i class="fas fa-sync-alt"></i> تحديث
          </button>
        </div>
      </div>

      <div class="stats-row" id="stats-row" style="margin-bottom:16px;"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>التاريخ</th>
              <th>الصنف</th>
              <th>الرصيد</th>
              <th>الفرع</th>
              <th>العميل</th>
              <th>كود العميل</th>
              <th>الحالة</th>
              <th>إجراء</th>
            </tr>
          </thead>
          <tbody id="shortage-list">
            <tr class="loading-row"><td colspan="8">⏳ جاري جلب البيانات...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="nav.js"></script>
  <script>
    let cachedData = [];
    let userBranch = '';

    checkAuth().then(user => {
      if (user) {
        userBranch = (localStorage.getItem('userBranch') || "عام").trim();
        document.getElementById('current-branch-name').textContent = userBranch;
        window.onload = () => loadShortages();
      }
    });

    async function loadShortages(forceRefresh = false) {
      const tbody = document.getElementById('shortage-list');
      if (cachedData.length === 0 || forceRefresh) {
        tbody.innerHTML = '<tr class="loading-row"><td colspan="8">⏳ جاري جلب البيانات...</td></tr>';
        try {
          const response = await fetchOrders();
          cachedData = (response[0]?.data) ? response[0].data : (response.data || response);
        } catch(e) {
          tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--danger);padding:30px;">❌ فشل الاتصال</td></tr>';
          return;
        }
      }
      renderStats();
      applyFilters();
    }

    function renderStats() {
      const myItems = cachedData.filter(item => {
        const itemBranch = String(item.user || item.branch || "").trim();
        return (userBranch === "عام" || userBranch === "Admin" || itemBranch === userBranch);
      });

      const needFollow = myItems.filter(i =>
        String(i.cust_state || "").trim() === "غير متوفر يحتاج متابعة" &&
        parseFloat(i.stq || 0) > 0
      ).length;

      const done = myItems.filter(i =>
        String(i.cust_state || "").trim() === "متوفر وتم ابلاغ العميل"
      ).length;

      const waitingStock = myItems.filter(i =>
        String(i.cust_state || "").trim() === "غير متوفر يحتاج متابعة" &&
        parseFloat(i.stq || 0) <= 0
      ).length;

      document.getElementById('stats-row').innerHTML = `
        <div class="stat-card">
          <div class="stat-num" style="color:var(--warning);">${needFollow}</div>
          <div class="stat-lbl">متاح للإبلاغ 🔔</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--text-muted);">${waitingStock}</div>
          <div class="stat-lbl">في انتظار الرصيد ⏳</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" style="color:var(--success);">${done}</div>
          <div class="stat-lbl">تم الإبلاغ ✅</div>
        </div>
      `;
    }

    function applyFilters() {
      const showAllCompleted = document.getElementById('show-all-completed').checked;

      const filtered = cachedData.filter(item => {
        const currentState = String(item.cust_state || "").trim();
        const itemBranch   = String(item.user || item.branch || "").trim();
        const isMyBranch   = (userBranch === "عام" || userBranch === "Admin" || itemBranch === userBranch);
        const isNeedFollow = (currentState === "غير متوفر يحتاج متابعة");
        const isDone       = (currentState === "متوفر وتم ابلاغ العميل");
        const hasStock     = (parseFloat(item.stq || 0) > 0);

        if (!isMyBranch) return false;

        if (!showAllCompleted) return isNeedFollow && hasStock;

        return (isNeedFollow && hasStock) || isDone;
      });

      renderTable(filtered);
    }

    function renderTable(items) {
      const tbody = document.getElementById('shortage-list');
      if (items.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="8" style="text-align:center;padding:50px;color:var(--text-muted);">
              ✅ لا توجد نواقص تحتاج متابعة حالياً
            </td>
          </tr>`;
        return;
      }

      items.sort((a, b) => {
        const aD = String(a.cust_state || "").includes("ابلاغ");
        const bD = String(b.cust_state || "").includes("ابلاغ");
        return aD - bD;
      });

      tbody.innerHTML = items.map(item => {
        const isDone      = String(item.cust_state || "").includes("ابلاغ");
        const displayDate = item.createdAt
          ? new Date(item.createdAt).toLocaleDateString('ar-EG')
          : '---';
        const stq = parseFloat(item.stq || 0);

        return `
          <tr class="${isDone ? 'row-done' : ''}">
            <td style="font-size:0.78rem;">${displayDate}</td>
            <td style="text-align:right;">
              <b>${item.item_name || '---'}</b>
              ${item.item_code
                ? `<div style="font-size:0.72rem;color:var(--text-muted);">
                     <i class="fas fa-barcode"></i> ${item.item_code}
                   </div>`
                : ''}
            </td>
            <td>
              <b style="color:${stq > 0 ? 'var(--success)' : 'var(--danger)'};">
                ${stq}
              </b>
            </td>
            <td><span class="branch-tag">${item.user || '---'}</span></td>
            <td style="font-size:0.82rem;">${item.cust_name || '---'}</td>
            <td>
              <code style="font-size:0.78rem;color:var(--text-secondary);">
                ${item.cust_code || '---'}
              </code>
            </td>
            <td>
              ${isDone
                ? '<span class="badge badge-green">تم الإبلاغ ✅</span>'
                : '<span class="badge badge-yellow">يحتاج متابعة 🔍</span>'}
            </td>
            <td>
              ${isDone
                ? '<i class="fas fa-check-double" style="color:var(--success);"></i>'
                : `<button class="btn btn-success btn-sm" onclick="markAsAvailable(event, ${item.id})">
                     <i class="fas fa-phone-alt"></i> تم التواصل
                   </button>`}
            </td>
          </tr>`;
      }).join('');
    }

    async function markAsAvailable(event, id) {
      const btn = event.target.closest('button');
      if (!confirm("تأكيد إبلاغ العميل بتوفر الصنف؟")) return;
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

      const success = await updateData({
        id,
        type:       "cs_action",
        cust_state: "متوفر وتم ابلاغ العميل",
        updatedAt:  new Date().toISOString()
      });

      if (success) {
        const idx = cachedData.findIndex(x => x.id == id);
        if (idx !== -1) cachedData[idx].cust_state = "متوفر وتم ابلاغ العميل";
        renderStats();
        applyFilters();
      } else {
        alert("فشل التحديث، يرجى المحاولة مرة أخرى");
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-phone-alt"></i> تم التواصل';
      }
    }
  </script>
</body>
</html>
