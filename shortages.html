<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>متابعة النواقص - صيدليات د. إبراهيم</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="nav-bar"></div>
  <div class="container">
    <div class="card">
      <div class="page-header">
        <div class="page-title">
          <i class="fas fa-exclamation-triangle" style="color:var(--warning);"></i>
          متابعة النواقص: <span class="highlight" id="current-branch-name">...</span>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <label class="check-label">
            <input type="checkbox" id="show-all-completed" onchange="applyFilters()"> عرض المكتمل
          </label>
          <button class="btn btn-primary" onclick="loadShortages(true)"><i class="fas fa-sync-alt"></i> تحديث</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>التاريخ</th>
              <th>الصنف</th>
              <th>الفرع</th>
              <th>العميل</th>
              <th>كود العميل</th>
              <th>الحالة</th>
              <th>إجراء</th>
            </tr>
          </thead>
          <tbody id="shortage-list">
            <tr class="loading-row"><td colspan="7">⏳ جاري جلب البيانات...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="nav.js"></script>
  <script>
// بعد ✅
let cachedData = [];
let userBranch = '';

checkAuth().then(user => {
  if (user) {
    userBranch = (localStorage.getItem('userBranch') || "عام").trim();
    document.getElementById('current-branch-name').textContent = userBranch;
    window.onload = () => loadShortages();
  }
});

    async function loadShortages(forceRefresh = false) {
      const tbody = document.getElementById('shortage-list');
      if (cachedData.length === 0 || forceRefresh) {
        tbody.innerHTML = '<tr class="loading-row"><td colspan="7">⏳ جاري جلب البيانات...</td></tr>';
        try {
          const response = await fetchOrders();
          cachedData = (response[0]?.data) ? response[0].data : (response.data || response);
        } catch(e) {
          tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--danger);padding:30px;">❌ فشل الاتصال</td></tr>';
          return;
        }
      }
      applyFilters();
    }

    function applyFilters() {
      const showAllCompleted = document.getElementById('show-all-completed').checked;
      const filtered = cachedData.filter(item => {
        const currentState = String(item.cust_state || "").trim();
        const itemBranch = String(item.user || item.branch || "").trim();
        const isMyBranch = (userBranch === "عام" || userBranch === "Admin" || itemBranch === userBranch);
        if (!isMyBranch) return false;
        const isDone = (currentState === "متوفر وتم ابلاغ العميل");
        if (showAllCompleted) return true;
        return !isDone;
      });
      renderTable(filtered);
    }

    function renderTable(items) {
      const tbody = document.getElementById('shortage-list');
      if (items.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:50px;color:var(--text-muted);">✅ لا توجد نواقص حالياً</td></tr>`;
        return;
      }
      items.sort((a, b) => (String(a.cust_state).includes("ابلاغ") ? 1 : -1));
      tbody.innerHTML = items.map(item => {
        const isDone = String(item.cust_state || "").includes("ابلاغ");
        const displayDate = item.createdAt ? new Date(item.createdAt).toLocaleDateString('ar-EG') : '---';
        return `
          <tr class="${isDone ? 'row-done' : ''}">
            <td style="font-size:0.78rem;">${displayDate}</td>
            <td style="text-align:right;"><b>${item.item_name}</b></td>
            <td><span class="branch-tag">${item.user}</span></td>
            <td style="font-size:0.82rem;">${item.cust_name || '---'}</td>
            <td><code style="font-size:0.78rem;color:var(--text-secondary);">${item.cust_code}</code></td>
            <td>
              ${isDone
                ? '<span class="badge badge-green">مكتمل ✅</span>'
                : '<span class="badge badge-yellow">متابعة 🔍</span>'}
            </td>
            <td>
              ${isDone
                ? '<i class="fas fa-check-double" style="color:var(--success);"></i>'
                : `<button class="btn btn-success btn-sm" onclick="markAsAvailable(event, ${item.id})">تم الإبلاغ</button>`}
            </td>
          </tr>`;
      }).join('');
    }

    async function markAsAvailable(event, id) {
      const btn = event.target.closest('button');
      if (!confirm("تأكيد إبلاغ العميل؟")) return;
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
      const success = await updateData({ id, type: "cs_action", cust_state: "متوفر وتم ابلاغ العميل", updatedAt: new Date().toISOString() });
      if (success) {
        const idx = cachedData.findIndex(x => x.id == id);
        if (idx !== -1) cachedData[idx].cust_state = "متوفر وتم ابلاغ العميل";
        applyFilters();
      } else {
        alert("فشل التحديث، يرجى المحاولة مرة أخرى");
        btn.disabled = false;
        btn.innerHTML = "تم الإبلاغ";
      }
    }
  </script>
</body>
</html>
